<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OH-YUM Object Viewer — 360°</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Chakra Petch', 'Rajdhani', sans-serif; }
    canvas { display: block; }
    #controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 10; flex-wrap: wrap; justify-content: center;
      max-width: 95vw;
    }
    button {
      background: rgba(10,20,30,0.85); color: #88aacc; border: 1px solid rgba(100,150,200,0.25);
      padding: 8px 16px; font-family: 'Chakra Petch', 'Rajdhani', sans-serif; font-size: 13px;
      letter-spacing: 2px; cursor: pointer; border-radius: 4px;
      transition: all 0.2s ease; white-space: nowrap;
    }
    button:hover { background: rgba(20,40,60,0.9); border-color: rgba(100,150,200,0.5); }
    button.active { border-color: #00bbff; color: #00bbff; box-shadow: 0 0 12px rgba(0,187,255,0.15); }
    #label {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: #88aacc; font-size: 20px; letter-spacing: 5px; opacity: 0.7;
      font-family: 'Orbitron', monospace;
    }
    #hint {
      position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
      color: #445566; font-size: 11px; letter-spacing: 2px;
    }
    #info {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      color: #556677; font-size: 11px; letter-spacing: 1px; text-align: center;
      max-width: 500px; line-height: 1.6;
    }
    #sep { color: #334455; margin: 0 2px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="label">PLAYER SHIP</div>
  <div id="hint">DRAG TO ROTATE · SCROLL TO ZOOM</div>
  <div id="info"></div>
  <div id="controls">
    <button id="btn-player" class="active">PLAYER</button>
    <button id="btn-enemy">ENEMY</button>
    <span id="sep">|</span>
    <button id="btn-asteroid">ASTEROID</button>
    <button id="btn-blackhole">BLACK HOLE</button>
    <span id="sep">|</span>
    <button id="btn-planet">PLANET</button>
    <button id="btn-moon">MOON</button>
    <span id="sep">|</span>
    <button id="btn-marsbase">MARS BASE</button>
    <button id="btn-colony">DOME COLONY</button>
    <span id="sep">|</span>
    <button id="btn-spin">PAUSE SPIN</button>
  </div>
  <script type="module" src="/src/ship-viewer-entry.ts"></script>
</body>
</html>

services:
  - type: web
    name: oh-yum-arena
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars: []
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

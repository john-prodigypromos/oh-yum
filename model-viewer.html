<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OH-YUM Model Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
  .header { padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a2e; }
  .header h1 { font-size: 18px; letter-spacing: 3px; color: #00ffff; font-weight: 600; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 2px; }
  .cell { position: relative; background: #0d0d14; aspect-ratio: 16/10; }
  .cell canvas { width: 100%; height: 100%; display: block; }
  .label { position: absolute; bottom: 12px; left: 16px; font-size: 11px; letter-spacing: 2px; color: #00ffff; text-transform: uppercase; pointer-events: none; text-shadow: 0 0 8px rgba(0,255,255,0.5); }
  .status { position: absolute; top: 12px; right: 16px; font-size: 10px; color: #666; letter-spacing: 1px; }
  .hint { text-align: center; padding: 12px; font-size: 11px; color: #444; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="header">
  <h1>OH-YUM MODEL VIEWER</h1>
  <div style="font-size:11px;color:#444;letter-spacing:1px;">DRAG TO ROTATE · SCROLL TO ZOOM</div>
</div>

<div class="grid" id="grid"></div>
<div class="hint">All models loaded from /public/models/</div>

<script type="importmap">
{
  "imports": {
    "three": "/node_modules/three/build/three.module.js",
    "three/addons/": "/node_modules/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const models = [
  { name: 'Player Ship', file: '/models/player-ship.glb' },
  { name: 'Enemy Ship', file: '/models/enemy-ship.glb' },
];

// Scan for additional models that might exist
const extraModels = [
  { name: 'Earth', file: '/models/earth.glb' },
  { name: 'Mars', file: '/models/mars.glb' },
  { name: 'Venus', file: '/models/venus.glb' },
  { name: 'Uranus', file: '/models/uranus.glb' },
  { name: 'Saturn', file: '/models/saturn.glb' },
  { name: 'Moon', file: '/models/moon.glb' },
  { name: 'Mars Canyon', file: '/models/mars-canyon.glb' },
  { name: 'Mars Base', file: '/models/mars-base.glb' },
  { name: 'Black Hole', file: '/models/black-hole.glb' },
];

const loader = new GLTFLoader();
const grid = document.getElementById('grid');

function createViewer(name, file) {
  const cell = document.createElement('div');
  cell.className = 'cell';

  const canvas = document.createElement('canvas');
  cell.appendChild(canvas);

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = name;
  cell.appendChild(label);

  const status = document.createElement('div');
  status.className = 'status';
  status.textContent = 'LOADING...';
  cell.appendChild(status);

  grid.appendChild(cell);

  // Three.js setup
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0d14);

  // PBR environment map — required for metallic materials to show color
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  pmremGenerator.compileEquirectangularShader();
  const envMap = pmremGenerator.fromScene(new RoomEnvironment(renderer), 0.04).texture;
  scene.environment = envMap;

  const camera = new THREE.PerspectiveCamera(45, 16 / 10, 0.1, 1000);
  camera.position.set(3, 2, 5);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.5;

  // Lighting
  const ambient = new THREE.AmbientLight(0x606080, 1.2);
  scene.add(ambient);

  const key = new THREE.DirectionalLight(0xffffff, 2.0);
  key.position.set(5, 8, 5);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0x4488cc, 0.6);
  fill.position.set(-3, 2, -3);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0x00ffff, 0.5);
  rim.position.set(0, -2, -5);
  scene.add(rim);

  // Load model
  loader.load(
    file,
    (gltf) => {
      const model = gltf.scene;

      // Apply materials — dark metallic hull with colored accent edge glow
      const isEnemy = file.includes('enemy');
      const accent = isEnemy ? new THREE.Color(0.6, 0.04, 0.01) : new THREE.Color(0.0, 0.4, 0.7);
      const hullColor = isEnemy ? new THREE.Color(0.03, 0.03, 0.04) : new THREE.Color(0.05, 0.07, 0.10);

      model.traverse((child) => {
        if (!(child instanceof THREE.Mesh)) return;
        try {
          const geo = child.geometry;
          if (!geo.attributes.normal) geo.computeVertexNormals();
          const normals = geo.attributes.normal;
          const count = normals.count;
          const colors = new Float32Array(count * 3);

          for (let v = 0; v < count; v++) {
            const nx = normals.getX(v);
            const ny = normals.getY(v);
            const nz = normals.getZ(v);
            const sideFactor = Math.sqrt(nx * nx + nz * nz);
            const flatness = Math.abs(ny);

            let r = hullColor.r + flatness * 0.03;
            let g = hullColor.g + flatness * 0.03;
            let b = hullColor.b + flatness * 0.04;

            const edgeGlow = Math.pow(sideFactor, 5) * 0.15;
            r += accent.r * edgeGlow;
            g += accent.g * edgeGlow;
            b += accent.b * edgeGlow;

            colors[v * 3] = Math.min(1, r);
            colors[v * 3 + 1] = Math.min(1, g);
            colors[v * 3 + 2] = Math.min(1, b);
          }

          geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
          child.material = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.6,
            metalness: 0.4,
            emissive: accent,
            emissiveIntensity: 0.05,
            envMapIntensity: 0.3,
          });
        } catch (e) {
          console.warn('Vertex color failed, using fallback:', e);
          child.material = new THREE.MeshStandardMaterial({
            color: hullColor,
            roughness: 0.6,
            metalness: 0.4,
            emissive: accent,
            emissiveIntensity: 0.05,
            envMapIntensity: 0.3,
          });
        }
      });

      scene.add(model);

      // Center and fit
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      model.position.sub(center);
      const scale = 3 / maxDim;
      model.scale.multiplyScalar(scale);

      // Update camera to frame the model
      camera.position.set(maxDim * scale * 1.5, maxDim * scale, maxDim * scale * 2);
      controls.target.set(0, 0, 0);
      controls.update();

      status.textContent = `${(size.x).toFixed(1)} × ${(size.y).toFixed(1)} × ${(size.z).toFixed(1)}`;
      status.style.color = '#00ff88';
    },
    undefined,
    () => {
      status.textContent = 'NOT FOUND';
      status.style.color = '#ff4444';
    }
  );

  // Resize
  const resize = () => {
    const rect = cell.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  };

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  // Delay first resize to let layout settle
  requestAnimationFrame(() => { resize(); animate(); });
  window.addEventListener('resize', resize);
}

// Create viewers for known models
models.forEach(m => createViewer(m.name, m.file));

// Check for extra models (show cell if file exists, skip if 404)
for (const m of extraModels) {
  try {
    const resp = await fetch(m.file, { method: 'HEAD' });
    if (resp.ok) createViewer(m.name, m.file);
  } catch {}
}
</script>
</body>
</html>
